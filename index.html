<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraBit Tech | Emoji Gauntlet</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Plus+Jakarta+Sans:wght@500;800&display=swap');
        :root {
            --brand: #8b5cf6; --accent: #06b6d4; --bg: #030712; 
            --card: #111827; --text: #f3f4f6; --success: #10b981;
            --error: #ef4444; --hint: #f59e0b; --neon: #ec4899;
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.25s ease; }
        body {
            background: linear-gradient(-45deg, #030712, #1e1b4b, #312e81, #1e1b4b);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text); overflow: hidden;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .app-card { background: rgba(17, 24, 39, 0.85); width: 92%; max-width: 420px; padding: 25px; border-radius: 40px; text-align: center; backdrop-filter: blur(25px); border: 2px solid rgba(255, 255, 255, 0.1); box-shadow: 0 0 60px rgba(139, 92, 246, 0.2); position: relative; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .score-box { text-align: left; }
        .score-label { display: block; font-size: 0.55rem; color: var(--accent); font-weight: 800; letter-spacing: 1px; }
        .score-val { font-family: 'Orbitron'; font-size: 1rem; color: white; }
        
        .music-toggle { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1rem; }

        .brand-logo { width: 40px; height: 40px; background: linear-gradient(135deg, var(--brand), var(--neon)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-weight: 900; margin: 0 auto 10px; box-shadow: 0 0 15px var(--brand); }

        .timer-container { position: relative; width: 65px; height: 65px; margin: 0 auto 15px; }
        .timer-svg { transform: rotate(-90deg); width: 65px; height: 65px; }
        .timer-bg { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 5; }
        .timer-path { fill: none; stroke: var(--accent); stroke-width: 5; stroke-linecap: round; }
        .timer-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Orbitron'; font-size: 1rem; font-weight: 900; }

        .q-icon { font-size: 2rem; margin-bottom: 10px; display: block; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); }
        .question-box { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 20px; min-height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); }
        
        input { width: 100%; padding: 16px; border: 2px solid rgba(255,255,255,0.1); border-radius: 18px; background: rgba(0,0,0,0.3); color: white; font-size: 1rem; text-align: center; outline: none; margin-bottom: 10px; }
        
        .btn-group { display: flex; gap: 8px; }
        .btn-main { background: linear-gradient(90deg, var(--brand), var(--neon)); color: white; padding: 16px; border: none; border-radius: 18px; font-weight: 800; cursor: pointer; text-transform: uppercase; flex: 2; font-size: 0.9rem; }
        .btn-hint { background: rgba(255,255,255,0.05); border: 1px solid var(--hint); color: var(--hint); border-radius: 18px; flex: 1; font-weight: 800; cursor: pointer; font-size: 0.7rem; }

        .correct-reveal { color: var(--success); font-weight: 900; font-size: 0.75rem; margin-top: 8px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="top-bar">
        <div class="score-box">
            <span class="score-label">CORE SCORE</span>
            <span class="score-val" id="cur-score">0</span>
        </div>
        <div class="music-toggle" onclick="toggleMusic()" id="m-btn">🔇</div>
    </div>

    <div id="start-view">
        <div class="brand-logo">Λ</div>
        <h2 style="font-family: 'Orbitron'; letter-spacing: 2px; margin: 0 0 5px;">AURABIT</h2>
        <p style="color: var(--accent); font-size: 0.6rem; letter-spacing: 2px; margin-bottom: 25px;">EMOJI CHALLENGE MODE</p>
        <input type="text" id="p-name" placeholder="AGENT IDENTITY...">
        <button class="btn-main" style="width:100%" onclick="initGame()">Login Protocol</button>
    </div>

    <div id="game-view" class="hidden">
        <div style="display: flex; justify-content: space-between; font-size: 0.6rem; font-weight: 800; color: var(--accent); margin-bottom: 5px; letter-spacing: 1px;">
            <span>SECTOR: <span id="cur-lvl">1</span></span>
            <span>INTEL: <span id="q-prog">1</span>/10</span>
        </div>
        
        <div class="timer-container">
            <svg class="timer-svg"><circle class="timer-bg" cx="32.5" cy="32.5" r="28"></circle><circle id="timer-path" class="timer-path" cx="32.5" cy="32.5" r="28" stroke-dasharray="175.9" stroke-dashoffset="0"></circle></svg>
            <span id="timer-text" class="timer-text">15</span>
        </div>

        <div id="feedback" style="height: 12px; font-weight: 900; font-size: 0.65rem; margin-bottom: 5px;"></div>
        
        <div class="question-box">
            <span id="q-icon" class="q-icon"></span>
            <div id="q-text" style="font-weight: 800; font-size: 1rem;">...</div>
            <div id="hint-text" style="color: var(--hint); font-size: 0.65rem; margin-top: 8px; font-weight: 600;" class="hidden"></div>
            <div id="correct-answer-reveal" class="correct-reveal hidden"></div>
        </div>

        <input type="text" id="ans-in" placeholder="DECODE..." autocomplete="off">
        <div class="btn-group">
            <button class="btn-hint" onclick="showHint()">HINT</button>
            <button class="btn-main" onclick="check()">SUBMIT</button>
        </div>
    </div>

    <div id="level-view" class="hidden">
        <span style="font-size: 3rem;">🚀</span>
        <h2 style="font-family: 'Orbitron'; color: var(--success);">SECTOR COMPLETE</h2>
        <h1 id="lvl-score-disp" style="font-size: 3rem; color: var(--neon); margin: 10px 0;">0</h1>
        <button id="next-btn" class="btn-main" style="width:100%">NEXT SECTOR</button>
    </div>

    <div id="finish-view" class="hidden">
        <span style="font-size: 3rem;">🏆</span>
        <h2 style="font-family: 'Orbitron';">MISSION SUCCESS</h2>
        <div id="final-score-disp" style="font-size: 2.5rem; font-weight: 900; margin: 10px 0;">0</div>
        <div id="rank-badge" style="background: var(--brand); padding: 8px 18px; border-radius: 50px; font-family: 'Orbitron'; font-size: 0.7rem; display: inline-block;"></div>
        <button class="btn-main" style="width:100%; margin-top: 25px;" onclick="location.reload()">RE-INITIATE</button>
    </div>
</div>

<script>
    let score = 0, currentLevel = 1, qIdx = 0, timer, timeLeft = 15, isMusicOn = false, audioCtx, musicInterval;
    
    const db = {
        1: [
            {q: "12 + 15?", a: "27", h: "Two-Seven", i: "➕"}, {q: "5 x 6?", a: "30", h: "Three-Zero", i: "✖️"}, {q: "100 - 45?", a: "55", h: "Double Five", i: "➖"}, {q: "2, 4, 6, 8, ?", a: "10", h: "Even", i: "🔢"}, {q: "3 x 3 x 3?", a: "27", h: "3 cubed", i: "🧊"},
            {q: "Half of 50?", a: "25", h: "Quarter-century", i: "🌓"}, {q: "Seconds in 1 min?", a: "60", h: "Six-Zero", i: "⏱️"}, {q: "Triangle sides?", a: "3", h: "Tri-", i: "🔺"}, {q: "10 + 20 + 30?", a: "60", h: "Three score", i: "📈"}, {q: "11 x 11?", a: "121", h: "1-2-1", i: "📏"}
        ],
        2: [
            {q: "Face but no eyes?", a: "clock", h: "Tells time", i: "🕰️"}, {q: "Wetter as it dries?", a: "towel", h: "In bathroom", i: "🚿"}, {q: "1, 3, 5, 7, ?", a: "9", h: "Odd", i: "🧮"}, {q: "Paris is capital of?", a: "france", h: "Europe country", i: "🗼"}, {q: "1, 4, 9, 16, ?", a: "25", h: "5x5", i: "⬜"},
            {q: "Legs of 3 cows?", a: "12", h: "3 x 4", i: "🐄"}, {q: "Months in a year?", a: "12", h: "One cycle", i: "📅"}, {q: "Opposite: Cold?", a: "hot", h: "Sun", i: "🔥"}, {q: "3, 6, 9, 12, ?", a: "15", h: "3x5", i: "📶"}, {q: "Boil water (C)?", a: "100", h: "Perfect cent", i: "☕"}
        ],
        3: [
            {q: "25% of 200?", a: "50", h: "1/4", i: "🍰"}, {q: "3x = 21. x=?", a: "7", h: "Seven", i: "🧬"}, {q: "Bark but no bite?", a: "tree", h: "Leaves", i: "🌳"}, {q: "10, 20, 40, 80, ?", a: "160", h: "Double", i: "⚡"}, {q: "Square root 64?", a: "8", h: "8x8", i: "💎"},
            {q: "Hexagon sides?", a: "6", h: "Six", i: "🐝"}, {q: "1, 1, 2, 3, 5, ?", a: "8", h: "Fibonacci", i: "🌀"}, {q: "Keys no locks?", a: "piano", h: "Instrument", i: "🎹"}, {q: "15 x 4?", a: "60", h: "1 Hour", i: "🏹"}, {q: "3, 9, 27, ?", a: "81", h: "9x9", i: "🏗️"}
        ],
        4: [
            {q: "Square angle?", a: "90", h: "Right", i: "📐"}, {q: "2, 3, 5, 7, 11, ?", a: "13", h: "Prime", i: "🎖️"}, {q: "Leap Year Days?", a: "366", h: "Extra day", i: "🌍"}, {q: "5=5, 100=?", a: "5", h: "Time constant", i: "⏳"}, {q: "Sister's dad?", a: "father", h: "Dad", i: "👨‍👩‍👧"},
            {q: "12, 11, 13, 12, 14, ?", a: "13", h: "Pattern", i: "🎢"}, {q: "4! (Factorial)?", a: "24", h: "4x3x2x1", i: "❗"}, {q: "Triangle sum?", a: "180", h: "Total", i: "⛺"}, {q: "Teeth no mouth?", a: "comb", h: "For hair", i: "💈"}, {q: "1/2 + 1/4?", a: "0.75", h: "Decimal", i: "🍕"}
        ],
        5: [
            {q: "1, 2, 6, 24, ?", a: "120", h: "5!", i: "🌌"}, {q: "1=5, 2=25... 5=?", a: "5", h: "Rule 1", i: "🤡"}, {q: "Months with 28?", a: "12", h: "All", i: "❄️"}, {q: "O,T,T,F,F,S,S,?", a: "e", h: "Eight", i: "🔢"}, {q: "A+B=110, A=100>B. B?", a: "5", h: "Math logic", i: "⚖️"},
            {q: "Binary 1010?", a: "10", h: "Ten", i: "💻"}, {q: "2, 12, 30, 56, ?", a: "90", h: "Next", i: "🚀"}, {q: "Broken no touch?", a: "promise", h: "Your word", i: "🤝"}, {q: "3, 4, 7, 11, 18, ?", a: "29", h: "Add last", i: "🔗"}, {q: "Cube root 125?", a: "5", h: "5x5x5", i: "🧊"}
        ]
    };

    function initGame() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('start-view').classList.add('hidden');
        document.getElementById('game-view').classList.remove('hidden');
        loadQ();
    }

    function toggleMusic() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (isMusicOn) { clearInterval(musicInterval); isMusicOn = false; document.getElementById('m-btn').innerText = "🔇"; }
        else { isMusicOn = true; document.getElementById('m-btn').innerText = "🔊"; musicInterval = setInterval(playSynthBeat, 400); }
    }

    function playSynthBeat() {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(timeLeft < 5 ? 330 : 110, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.015, audioCtx.currentTime); osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function loadQ() {
        if (qIdx >= 10) { showLevelUp(); return; }
        const item = db[currentLevel][qIdx];
        document.getElementById('cur-lvl').innerText = currentLevel;
        document.getElementById('q-prog').innerText = qIdx + 1;
        document.getElementById('cur-score').innerText = score;
        document.getElementById('q-icon').innerText = item.i;
        document.getElementById('q-text').innerText = item.q;
        document.getElementById('ans-in').value = "";
        document.getElementById('feedback').innerText = "";
        document.getElementById('hint-text').classList.add('hidden');
        document.getElementById('correct-answer-reveal').classList.add('hidden');
        document.getElementById('ans-in').focus();
        timeLeft = 15; updateTimer();
        clearInterval(timer);
        timer = setInterval(() => { timeLeft--; updateTimer(); if (timeLeft <= 0) next(false, item.a); }, 1000);
    }

    function updateTimer() {
        document.getElementById('timer-text').innerText = timeLeft;
        document.getElementById('timer-path').style.strokeDashoffset = 175.9 - (timeLeft / 15) * 175.9;
        document.getElementById('timer-path').style.stroke = timeLeft < 5 ? "var(--error)" : "var(--accent)";
    }

    function showHint() {
        const h = db[currentLevel][qIdx].h;
        const ht = document.getElementById('hint-text');
        ht.innerText = "HINT: " + h; ht.classList.remove('hidden');
        score = Math.max(0, score - 2); document.getElementById('cur-score').innerText = score;
    }

    function check() {
        const user = document.getElementById('ans-in').value.trim().toLowerCase();
        const correct = db[currentLevel][qIdx].a;
        if (user === correct) { score += 10; next(true); } 
        else { next(false, correct); }
    }

    function next(isCorrect, answer) {
        clearInterval(timer);
        const fb = document.getElementById('feedback');
        const reveal = document.getElementById('correct-answer-reveal');
        if (isCorrect) { fb.innerText = "SYSTEM SECURE ✅"; fb.style.color = "var(--success)"; } 
        else {
            fb.innerText = "SYSTEM BREACHED ❌"; fb.style.color = "var(--error)";
            reveal.innerText = "KEY: " + (answer || "TIMEOUT").toUpperCase();
            reveal.classList.remove('hidden');
        }
        setTimeout(() => { qIdx++; loadQ(); }, isCorrect ? 800 : 2200);
    }

    function showLevelUp() {
        document.getElementById('game-view').classList.add('hidden');
        document.getElementById('level-view').classList.remove('hidden');
        document.getElementById('lvl-score-disp').innerText = score;
        document.getElementById('next-btn').onclick = () => {
            currentLevel++; qIdx = 0;
            if (currentLevel > 5) finishGame();
            else { document.getElementById('level-view').classList.add('hidden'); document.getElementById('game-view').classList.remove('hidden'); loadQ(); }
        };
    }

    function finishGame() {
        document.getElementById('level-view').classList.add('hidden');
        document.getElementById('finish-view').classList.remove('hidden');
        document.getElementById('final-score-disp').innerText = score;
        document.getElementById('rank-badge').innerText = score > 400 ? "DIAMOND AGENT" : "GOLD AGENT";
    }

    document.getElementById('ans-in').addEventListener("keyup", (e) => { if(e.key === "Enter") check(); });
</script>
</body>
</html>
